<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Atrapa el corazón ❤️</title>

<style>
  body {
    margin: 0;
    padding: 0;
    background: radial-gradient(circle at top, #ff9a9e, #fecfef, #f5576c);
    background-size: 400% 400%;
    animation: fondoAnimado 12s ease infinite;
    font-family: "Poppins", sans-serif;
    overflow: hidden;
    text-align: center;
    color: white;
    transition: background 1s ease;
  }

  /* Fondo animado */
  @keyframes fondoAnimado {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* Modo noche */
  .noche {
    background: linear-gradient(120deg, #000428, #004e92);
    background-size: 400% 400%;
    animation: fondoAnimado 12s ease infinite;
  }

  h1 {
    margin-top: 20px;
    font-size: 2.5rem;
    animation: glow 2s infinite;
    cursor: pointer;
  }

  #info {
    font-size: 1.3rem;
    margin-bottom: 10px;
  }

  #corazon {
    position: absolute;
    font-size: 3rem;
    cursor: pointer;
    animation: latido 1s infinite;
    user-select: none;
  }

  @keyframes latido {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.3); }
  }

  @keyframes glow {
    0%, 100% { text-shadow: 0 0 10px white, 0 0 20px #ff3366; }
    50% { text-shadow: 0 0 5px white, 0 0 10px #ff3366; }
  }

  #mensajeFinal {
    position: fixed;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 2rem;
    background: rgba(255, 255, 255, 0.2);
    padding: 20px 40px;
    border-radius: 20px;
    display: none;
    animation: glow 2s infinite;
  }

  #volver {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    color: #ff3366;
    padding: 12px 25px;
    border-radius: 25px;
    font-size: 1.2rem;
    font-weight: bold;
    text-decoration: none;
    box-shadow: 0 0 10px rgba(255,255,255,0.6);
    transition: 0.3s;
  }

  #volver:hover {
    background: #ffe6ee;
    transform: translateX(-50%) scale(1.1);
  }
</style>
</head>

<body>

<h1 id="titulo">Atrapa el corazón ❤️</h1>
<div id="info">Vidas: <span id="vidas">3</span> | Atrapados: <span id="puntos">0</span>/3</div>

<div id="corazon">💖</div>

<div id="mensajeFinal">GANASTE AMOR ❤️</div>

<a id="volver" href="yoo.html">Volver al corazón ❤️</a>

<script>
  const corazon = document.getElementById("corazon");
  const vidasTexto = document.getElementById("vidas");
  const puntosTexto = document.getElementById("puntos");
  const mensajeFinal = document.getElementById("mensajeFinal");

  let vidas = 3;
  let puntos = 0;
  let gano = false;

  // Modo noche tocando el título
  document.getElementById("titulo").addEventListener("click", () => {
    document.body.classList.toggle("noche");
  });

  function moverCorazon() {
    const ancho = window.innerWidth - 80;
    const alto = window.innerHeight - 80;

    const x = Math.random() * ancho;
    const y = Math.random() * alto;

    corazon.style.left = x + "px";
    corazon.style.top = y + "px";
  }

  // Atrapar el corazón
  corazon.addEventListener("click", () => {
    if (gano) return;

    puntos++;
    puntosTexto.textContent = puntos;

    if (puntos >= 3) {
      gano = true;
      mensajeFinal.style.display = "block";

      setTimeout(() => {
        window.location.href = "la carta.html";
      }, 3000);
    }
  });

  // Perder vidas
  document.addEventListener("click", (e) => {
    if (e.target === corazon || gano) return;

    vidas--;
    vidasTexto.textContent = vidas;

    if (vidas <= 0) {
      alert("Perdiste 😢 — vuelve a intentarlo");
      vidas = 3;
      puntos = 0;
      vidasTexto.textContent = vidas;
      puntosTexto.textContent = puntos;
    }
  });

  // Movimiento más rápido (la mitad del doble)
  setInterval(() => {
    if (!gano) moverCorazon();
  }, 1350);

  moverCorazon();
</script>

</body>
</html>
