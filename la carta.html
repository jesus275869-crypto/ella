<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti, mi amor ❤️</title>

<style>
  body {
    margin: 0;
    padding: 0;
    background: linear-gradient(120deg, #ff9a9e, #fecfef, #f5576c);
    background-size: 400% 400%;
    animation: fondoAnimado 12s ease infinite;
    font-family: "Poppins", sans-serif;
    color: white;
    text-align: center;
    transition: background 1s ease;
    overflow-y: auto;
  }

  @keyframes fondoAnimado {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .noche {
    background: linear-gradient(120deg, #000428, #004e92);
    background-size: 400% 400%;
    animation: fondoAnimado 12s ease infinite;
  }

  h1 {
    margin-top: 40px;
    font-size: 2.8rem;
    animation: glow 2s infinite;
    cursor: pointer;
  }

  @keyframes glow {
    0%, 100% { text-shadow: 0 0 10px white, 0 0 20px #ff3366; }
    50% { text-shadow: 0 0 5px white, 0 0 10px #ff3366; }
  }

  #corazonFinal {
    margin-top: 20px;
    font-size: 4.5rem;
    animation: latido 1.5s infinite;
    cursor: pointer;
    position: relative;
    z-index: 999;
  }

  @keyframes latido {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.3); }
  }

  #carta {
    width: 90%;
    max-width: 700px;
    margin: 30px auto;
    font-size: 1.4rem;
    line-height: 1.7;
    white-space: pre-line;
    text-shadow: 0 0 5px rgba(0,0,0,0.3);
    min-height: 300px;
  }

  .mini {
    position: fixed;
    font-size: 30px;
    animation: volar 1.5s forwards;
    pointer-events: none;
  }

  @keyframes volar {
    from { opacity: 1; transform: translate(0,0) scale(1); }
    to { opacity: 0; transform: translate(var(--x), var(--y)) scale(2); }
  }

  /* BOTÓN PARA IR AL FINAL */
  #botonFinal {
    display: inline-block;
    margin: 40px auto;
    background: white;
    color: #ff3366;
    padding: 15px 30px;
    border-radius: 30px;
    font-size: 1.4rem;
    font-weight: bold;
    text-decoration: none;
    box-shadow: 0 0 15px rgba(255,255,255,0.7);
    transition: 0.3s;
  }

  #botonFinal:hover {
    background: #ffe6ee;
    transform: scale(1.1);
  }
</style>
</head>

<body>

<audio id="musica" autoplay loop muted>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7e8e3f3c8e.mp3?filename=romantic-soft-piano-110624.mp3" type="audio/mpeg">
</audio>

<h1 id="titulo">Para ti, mi amor ❤️</h1>

<div id="corazonFinal">💖</div>

<div id="carta"></div>

<!-- BOTÓN PARA IR AL FINAL -->
<a id="botonFinal" href="finalll bummmmmm.html">Ir al final ❤️</a>

<script>
  document.addEventListener("click", () => {
    document.getElementById("musica").muted = false;
  }, { once: true });

  document.getElementById("titulo").addEventListener("click", () => {
    document.body.classList.toggle("noche");
  });

  const corazon = document.getElementById("corazonFinal");
  corazon.addEventListener("click", () => {
    const cantidad = 80;

    for (let i = 0; i < cantidad; i++) {
      let mini = document.createElement("div");
      mini.classList.add("mini");
      mini.innerHTML = "💖";

      mini.style.left = window.innerWidth / 2 + "px";
      mini.style.top = window.innerHeight / 2 + "px";

      const x = (Math.random() - 0.5) * 2000;
      const y = (Math.random() - 0.5) * 2000;

      mini.style.setProperty("--x", x + "px");
      mini.style.setProperty("--y", y + "px");

      document.body.appendChild(mini);

      setTimeout(() => mini.remove(), 1500);
    }
  });

  const cartaTexto = `
Mi amor…

Hoy se cumplen 2 meses desde que empezamos a caminar juntos,
y no puedo explicar lo feliz que me hace tenerte.

Cada día con vos se siente especial,
cada mensaje, cada risa, cada momento.

Gracias por elegirme,
por quedarte,
por hacerme sentir querido.

Dos meses… y ya siento que esto recién empieza.

Te adoro con todo mi corazón.
`;

  let i = 0;
  const cartaDiv = document.getElementById("carta");

  function escribirCarta() {
    if (i < cartaTexto.length) {
      cartaDiv.innerHTML += cartaTexto.charAt(i);
      i++;

      window.scrollTo({
        top: document.body.scrollHeight,
        behavior: "smooth"
      });

      setTimeout(escribirCarta, 40);
    }
  }

  escribirCarta();
</script>

</body>
